<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ post.title }}</title>

    <link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">
            AzubiTalk.
        </div>

    </nav>

    <main class="container">

        <section class="posts">

            <a href="/" class="back-btn">
                            Zurück
            </a>


            <article class="post">

                <div class="votes">
                    ▲
                    <br>
                    {{ post.votes | default(0) }}
                </div>

                <div class="post-content">

                    <h2>{{ post.title }}</h2>

                    <p>{{ post.content }}</p>

                    <div class="tags">

                        {% for tag in post.tags | default(["Neu"]) %}
                        <span>{{ tag }}</span>
                        {% endfor %}

                    </div>

                    <div class="meta">

                        <span>{{ post.author.first_name }} {{ post.author.last_name }}</span>
                        <span>{{ post.answer_count }} Antworten</span>

                    </div>

                </div>

            </article>

        </section>

    </main>

</body>

</html>
